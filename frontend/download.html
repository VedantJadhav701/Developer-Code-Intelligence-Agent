<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download — DevAgent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .download-hero { padding: 8rem 0; text-align: center; }
        .download-card { background: var(--glass); border: 1px solid var(--border); padding: 4rem; border-radius: 24px; max-width: 800px; margin: 0 auto; }
        .copy-box { background: #000; border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; }
    </style>
</head>
<body>
    <nav>
        <div class="container" style="display: flex; justify-content: space-between; width: 100%;">
            <a href="index.html" class="logo"><div class="logo-icon"></div>DevAgent</a>
            <div class="nav-links">
                <a href="docs.html">Docs</a>
                <a href="benchmarks.html">Benchmarks</a>
                <a href="download.html" class="active">Download</a>
                <a href="https://github.com/VedantJadhav701/Developer-Code-Intelligence-Agent" class="btn btn-white" style="padding: 0.6rem 1.2rem; font-size: 0.9rem;">Star</a>
            </div>
        </div>
    </nav>
    <div class="container download-hero">
        <h1 class="section-title">Ready to build?</h1>
        <div class="download-card">
            <p style="font-size: 1.25rem; color: var(--muted);">Install the DevAgent CLI via PyPI. 100% Local. Zero configuration required.</p>
            <div class="copy-box">
                <code class="mono" style="color: var(--secondary);">pip install devagent-cli</code>
                <button class="btn btn-white" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Copy</button>
            </div>
            <p style="margin-top: 2rem; font-size: 0.9rem; color: #71717a;">Requires Python 3.11+ and Ollama running locally.</p>
        </div>
    </div>
</body>
</html>
